<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暁秀祭2027 公式サイト</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:"Yu Gothic","Hiragino Sans",sans-serif;
background:#fff;
color:#222;
line-height:1.6;
overflow-x:hidden;
}

/* 背景 */
.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,30,70,.45),rgba(0,0,0,.45)),
url("background.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
color:#fff;
}

/* header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px 40px;
flex-wrap:wrap;
}

.logo{
font-size:1.4rem;
font-weight:700;
letter-spacing:2px;
}

nav{
display:flex;
gap:12px;
flex-wrap:wrap;
}

nav a{
color:#fff;
text-decoration:none;
padding:10px 18px;
border:1px solid rgba(255,255,255,.7);
border-radius:30px;
transition:.3s;
}

nav a:hover{
background:#fff;
color:#003366;
}

/* 中央 */
.center{
margin:auto;
text-align:center;
padding:20px;
}

.sub{
font-size:1.1rem;
letter-spacing:6px;
margin-bottom:12px;
}

.main{
font-size:clamp(3rem,10vw,7rem);
font-weight:900;
text-shadow:0 4px 20px rgba(0,0,0,.4);
}

.date{
font-size:1.3rem;
margin:14px 0 30px;
}

.countdown{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,.15);
backdrop-filter:blur(6px);
padding:18px 22px;
border-radius:18px;
min-width:90px;
}

.num{
font-size:2rem;
font-weight:800;
}

.label{
font-size:.9rem;
}

/* ボタン */
.top-buttons{
margin-top:35px;
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

.top-buttons a{
background:#fff;
color:#003366;
text-decoration:none;
padding:12px 22px;
border-radius:30px;
font-weight:700;
transition:.3s;
}

.top-buttons a:hover{
transform:translateY(-3px);
}

/* 共通 */
section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
font-size:2rem;
margin-bottom:28px;
color:#003366;
}

/* 企画カード */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.item{
background:#f4f8ff;
padding:24px;
border-radius:16px;
text-align:center;
font-weight:700;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.item:hover{
transform:translateY(-5px);
}

/* map */
.map-frame{
width:100%;
height:450px;
border:none;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* footer */
footer{
background:#003366;
color:#fff;
text-align:center;
padding:30px;
margin-top:40px;
}

/* スマホ */
@media(max-width:700px){

header{
justify-content:center;
gap:15px;
padding:20px;
}

nav{
justify-content:center;
}

.box{
min-width:78px;
padding:15px;
}

}
</style>
</head>

<body>

<div class="hero">

<header>
<div class="logo">暁秀祭2027</div>

<nav>
<a href="#event">企画</a>
<a href="#map">アクセス</a>
<a href="#info">案内</a>
</nav>
</header>

<div class="center">

<div class="sub">GYOSHU FESTIVAL 2027</div>
<div class="main">暁秀祭</div>
<div class="date">2027年5月16日（日）開催</div>

<div class="countdown">

<div class="box"><div class="num" id="day">--</div><div class="label">日</div></div>
<div class="box"><div class="num" id="hour">--</div><div class="label">時間</div></div>
<div class="box"><div class="num" id="min">--</div><div class="label">分</div></div>
<div class="box"><div class="num" id="sec">--</div><div class="label">秒</div></div>

</div>

<div class="top-buttons">
<a href="#event">企画を見る</a>
<a href="#map">アクセス</a>
<a href="#info">ご案内</a>
</div>

</div>
</div>

<section id="event">
<h2>イベント内容</h2>

<div class="grid">
<div class="item">クラス展示</div>
<div class="item">模擬店エリア</div>
<div class="item">体育館ステージ</div>
<div class="item">部活動展示</div>
</div>

</section>

<section id="map">
<h2>アクセスマップ</h2>

<iframe
class="map-frame"
src="https://www.google.com/maps?q=加藤学園暁秀中学校高等学校&output=embed"
loading="lazy">
</iframe>

</section>

<section id="info">
<h2>ご案内</h2>
<div class="grid">
<div class="item">駐車場には限りがあります</div>
<div class="item">公共交通機関をご利用ください</div>
<div class="item">ご来場お待ちしております</div>
</div>
</section>

<footer>
© 2027 暁秀祭 実行委員会
</footer>

<script>
function countdown(){

const target = new Date("2027-05-16T09:00:00").getTime();
const now = new Date().getTime();
const diff = target - now;

if(diff <= 0){
document.querySelector(".countdown").innerHTML="開催中！";
return;
}

document.getElementById("day").textContent =
Math.floor(diff/(1000*60*60*24));

document.getElementById("hour").textContent =
Math.floor((diff/(1000*60*60))%24);

document.getElementById("min").textContent =
Math.floor((diff/(1000*60))%60);

document.getElementById("sec").textContent =
Math.floor((diff/1000)%60);

}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
