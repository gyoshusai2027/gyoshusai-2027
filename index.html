<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暁秀祭2027 公式サイト</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:"Yu Gothic","Hiragino Sans",sans-serif;
background:#ffffff;
color:#222;
line-height:1.6;
}

/* ヒーロー */
.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,40,80,.45),rgba(0,0,0,.45)),
url("background.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
color:#fff;
}

/* ヘッダー */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px 40px;
flex-wrap:wrap;
}

.logo{
font-size:1.4rem;
font-weight:700;
letter-spacing:2px;
}

nav{
display:flex;
gap:12px;
flex-wrap:wrap;
}

nav a{
color:#fff;
text-decoration:none;
padding:10px 18px;
border:1px solid rgba(255,255,255,.7);
border-radius:30px;
transition:.3s;
font-size:.95rem;
}

nav a:hover{
background:#fff;
color:#003366;
}

/* 中央文字 */
.center{
margin:auto;
text-align:center;
padding:20px;
}

.sub{
font-size:1.2rem;
letter-spacing:8px;
margin-bottom:10px;
opacity:.95;
}

.main{
font-size:clamp(3rem,9vw,7rem);
font-weight:900;
letter-spacing:4px;
text-shadow:0 4px 20px rgba(0,0,0,.35);
}

.date{
font-size:1.3rem;
margin-top:10px;
margin-bottom:35px;
}

.countdown{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,.16);
backdrop-filter:blur(6px);
padding:18px 22px;
border-radius:18px;
min-width:95px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.num{
font-size:2rem;
font-weight:800;
}

.label{
font-size:.9rem;
margin-top:4px;
}

/* セクション */
section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

h2{
font-size:2rem;
text-align:center;
margin-bottom:25px;
color:#003366;
}

.card{
background:#fff;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-top:20px;
}

.schedule-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:20px;
}

.item{
background:#f3f8ff;
padding:20px;
border-radius:14px;
}

.map{
width:100%;
border:none;
border-radius:18px;
min-height:420px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* フッター */
footer{
margin-top:40px;
background:#003366;
color:#fff;
text-align:center;
padding:25px;
font-size:.95rem;
}

/* スマホ */
@media(max-width:700px){

header{
justify-content:center;
gap:15px;
padding:20px;
}

nav{
justify-content:center;
}

.date{
font-size:1.05rem;
}

.box{
min-width:80px;
padding:15px;
}

}
</style>
</head>

<body>

<div class="hero">

<header>
<div class="logo">暁秀祭 2027</div>

<nav>
<a href="#about">概要</a>
<a href="#schedule">企画</a>
<a href="#map">マップ</a>
<a href="#access">アクセス</a>
</nav>
</header>

<div class="center">
<div class="sub">AKATSUKI FESTIVAL</div>
<div class="main">暁秀祭</div>
<div class="date">2027年5月16日（日）開催</div>

<div class="countdown">

<div class="box">
<div class="num" id="day">--</div>
<div class="label">日</div>
</div>

<div class="box">
<div class="num" id="hour">--</div>
<div class="label">時間</div>
</div>

<div class="box">
<div class="num" id="min">--</div>
<div class="label">分</div>
</div>

<div class="box">
<div class="num" id="sec">--</div>
<div class="label">秒</div>
</div>

</div>
</div>
</div>

<section id="about">
<h2>開催概要</h2>
<div class="card">
地域の皆さまへ感謝を込めて開催する暁秀祭。<br>
展示・模擬店・ステージ企画など、多くの催しをご用意しています。<br>
ぜひご来場ください。
</div>
</section>

<section id="schedule">
<h2>企画案内</h2>

<div class="schedule-list">
<div class="item">クラス展示</div>
<div class="item">模擬店エリア</div>
<div class="item">体育館ステージ</div>
<div class="item">部活動発表</div>
</div>

</section>

<section id="map">
<h2>フロアマップ</h2>
<div class="card">
ここに校内マップ画像を掲載できます
</div>
</section>

<section id="access">
<h2>アクセス</h2>
<div class="card">
加藤学園暁秀中学校・高等学校<br>
静岡県沼津市岡宮字寺林1250
</div>
</section>

<footer>
© 2027 暁秀祭 実行委員会
</footer>

<script>
function countdown(){

const target = new Date("2027-05-16T09:00:00").getTime();
const now = new Date().getTime();
const diff = target - now;

if(diff <= 0){
document.querySelector(".countdown").innerHTML="開催中！";
return;
}

const day = Math.floor(diff/(1000*60*60*24));
const hour = Math.floor((diff/(1000*60*60))%24);
const min = Math.floor((diff/(1000*60))%60);
const sec = Math.floor((diff/1000)%60);

document.getElementById("day").textContent=day;
document.getElementById("hour").textContent=hour;
document.getElementById("min").textContent=min;
document.getElementById("sec").textContent=sec;

}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
