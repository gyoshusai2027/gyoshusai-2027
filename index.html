<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暁秀祭 2027</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family: "Yu Gothic", sans-serif;
    background:#000;
    color:#fff;
}

/* 背景メイン */
.hero{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1505236858219-8359eb29e329?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
}

/* ヘッダー */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    flex-wrap:wrap;
}

.logo{
    font-size:1.3rem;
    font-weight:bold;
    letter-spacing:2px;
}

nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

nav a{
    color:#fff;
    text-decoration:none;
    border:1px solid #fff;
    padding:8px 18px;
    transition:.3s;
    font-size:.9rem;
}

nav a:hover{
    background:#fff;
    color:#000;
}

/* 中央 */
.main{
    margin:auto;
    text-align:center;
    padding:20px;
}

.sub{
    font-size:1.4rem;
    letter-spacing:8px;
    margin-bottom:10px;
}

.title{
    font-size:clamp(3rem,8vw,7rem);
    font-weight:900;
    margin-bottom:10px;
}

.date{
    font-size:1.3rem;
    margin-bottom:30px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.box{
    background:rgba(255,255,255,.12);
    padding:15px 20px;
    border-radius:12px;
    min-width:90px;
}

.num{
    font-size:2rem;
    font-weight:bold;
}

.label{
    font-size:.9rem;
}

/* 下部 */
section{
    padding:70px 20px;
    background:#fff;
    color:#222;
    text-align:center;
}

h2{
    font-size:2rem;
    margin-bottom:25px;
}

.map{
    max-width:900px;
    margin:auto;
    background:#f0f0f0;
    border-radius:15px;
    padding:80px 20px;
}

footer{
    background:#111;
    color:#aaa;
    text-align:center;
    padding:20px;
    font-size:.9rem;
}

@media(max-width:700px){
header{
    justify-content:center;
    gap:15px;
}
nav{
    justify-content:center;
}
}
</style>
</head>

<body>

<div class="hero">

<header>
<div class="logo">暁秀祭 2027</div>

<nav>
<a href="#about">概要</a>
<a href="#schedule">日程</a>
<a href="#map">フロアマップ</a>
<a href="#access">アクセス</a>
</nav>
</header>

<div class="main">
<div class="sub">暁秀祭</div>
<div class="title">文化の部</div>
<div class="date">2027年5月16日（日）</div>

<div class="countdown">
<div class="box">
<div class="num" id="day">--</div>
<div class="label">日</div>
</div>

<div class="box">
<div class="num" id="hour">--</div>
<div class="label">時間</div>
</div>

<div class="box">
<div class="num" id="min">--</div>
<div class="label">分</div>
</div>

<div class="box">
<div class="num" id="sec">--</div>
<div class="label">秒</div>
</div>
</div>
</div>
</div>

<section id="about">
<h2>イベント概要</h2>
<p>暁秀祭2027 文化の部へようこそ！</p>
</section>

<section id="schedule">
<h2>日程</h2>
<p>2027年5月16日（日）開催予定</p>
</section>

<section id="map">
<h2>フロアマップ</h2>
<div class="map">
ここに校内マップ画像を入れられます
</div>
</section>

<section id="access">
<h2>アクセス</h2>
<p>加藤学園暁秀高等学校</p>
</section>

<footer>
© 暁秀祭2027
</footer>

<script>
function countdown(){
const target = new Date("2027-05-16T09:00:00").getTime();
const now = new Date().getTime();
const diff = target - now;

if(diff <= 0){
document.querySelector(".countdown").innerHTML = "開催中！";
return;
}

const day = Math.floor(diff / (1000*60*60*24));
const hour = Math.floor((diff / (1000*60*60)) % 24);
const min = Math.floor((diff / (1000*60)) % 60);
const sec = Math.floor((diff / 1000) % 60);

document.getElementById("day").textContent = day;
document.getElementById("hour").textContent = hour;
document.getElementById("min").textContent = min;
document.getElementById("sec").textContent = sec;
}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
